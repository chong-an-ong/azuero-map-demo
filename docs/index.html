<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELTI Model Farms – Azuero Peninsula</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fetch GeoJSON -->
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .legend {
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3);
      line-height: 1.6;
      font-size: 13px;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-box {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    // ── MAP INIT ──────────────────────────────────────────────────────────────
    const map = L.map('map', {
      center: [7.6, -80.5],   // Azuero Peninsula
      zoom: 11
    });

    // ── BASEMAP ───────────────────────────────────────────────────────────────
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri',
      maxZoom: 18
    }).addTo(map);

    // ── FARM STYLE ────────────────────────────────────────────────────────────
    const farmStyle = {
      color:       '#2d6a4f',   // dark green border
      weight:       2,
      opacity:      1,
      fillColor:   '#52b788',   // mid green fill
      fillOpacity:  0.45
    };

    const hoverStyle = {
      weight:      3,
      fillOpacity: 0.7
    };

    // ── LOAD GEOJSON ──────────────────────────────────────────────────────────
    fetch('farms.geojson')
      .then(r => r.json())
      .then(data => {
        const layer = L.geoJSON(data, {
          style: farmStyle,

          onEachFeature: function (feature, layer) {
	      const name = feature.properties.Name || 'Farm';

	        // build popup content
  	      let popupContent;
  	      if (name === 'Ramiro Castillo') {
	          popupContent = `
      	      <strong>${name}</strong><br>
      	      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSeGDwKXlgq2TDpndePaKckbCJo1n46l-TaurdSCYquMQ&s=10"
	                 style="width:160px; margin:6px 0; display:block; border-radius:4px;" /><br>
	            <a href="https://google.com" target="_blank">Learn more →</a>
	          `;
	        } else {
	          popupContent = `<strong>${name}</strong>`;
	        }
	      
	        layer.bindPopup(popupContent, { closeButton: false });
	      
	        // hover highlight
	        layer.on({
	          mouseover: function (e) {
	            e.target.setStyle(hoverStyle);
	            e.target.openPopup();
	          },
	          mouseout: function (e) {
	            geojsonLayer.resetStyle(e.target);
	            e.target.closePopup();
	          }
	        });
	      }
        }).addTo(map);

        // store ref for resetStyle
        window.geojsonLayer = layer;

        // fit map to farms
        map.fitBounds(layer.getBounds(), { padding: [30, 30] });
      });

    // ── LEGEND ────────────────────────────────────────────────────────────────
    const legend = L.control({ position: 'bottomright' });

    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <div class="legend-title">ELTI Azuero Peninsula</div>
        <div class="legend-item">
          <div class="legend-box" style="background:#52b788; border: 2px solid #2d6a4f;"></div>
          <span>Model farm</span>
        </div>
        <div style="margin-top:6px; font-size:11px; color:#666;">
          Click or hover a polygon<br>to see the farm name
        </div>
      `;
      return div;
    };

    legend.addTo(map);
  </script>
</body>
</html>
